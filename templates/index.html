<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer - Neha</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; width: 80%; max-width: 600px; }
        textarea { width: 100%; height: 150px; margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Resume Analyzer</h1>
    <p>अपना रिज्यूमे यहाँ पेस्ट करें और एनालाइज करें:</p>
    
    <textarea id="resumeContent" placeholder="Paste your resume text here..."></textarea><br>
    
    <button onclick="analyzeResume()">Analyze Now</button>

    <div id="result"></div>
</div>

<script>
    async function analyzeResume() {
        const text = document.getElementById('resumeContent').value;
        const resultDiv = document.getElementById('result');
        
        if(!text) {
            alert("कृपया पहले रिज्यूमे पेस्ट करें!");
            return;
        }

        resultDiv.innerHTML = "एनालाइज हो रहा है... कृपया रुकें...";

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();
            
            resultDiv.innerHTML = `
                <p style="color: green; font-size: 20px;">स्कोर: ${data.score}%</p>
                <p>मिली हुई स्किल्स: ${data.skills_found.join(", ") || "कोई नहीं"}</p>
            `;
        } catch (error) {
            resultDiv.innerHTML = "Error: बैकएंड से कनेक्ट नहीं हो पाया।";
        }
    }
</script>

</body>
</html>
